<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>软件评测师备考进度指挥中心 | 2026</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #0f1119;
    --neon: #00f0ff;        /* 赛博青 */
    --neon2: #0080ff;       /* 科技蓝 */
    --neon3: #7000ff;       /* 霓虹紫 */
    --green: #00ff88;       /* 数据绿 */
    --yellow: #ffee00;      /* 警报黄 */
    --red: #ff0044;         /* 危险红 */
    --grid: rgba(0,240,255,0.03);
    --card: rgba(10,12,20,0.55);
    --border: rgba(0,240,255,0.12);
    --text: #a0a8c0;
    --text-dim: #5a6070;
    --text-bright: #e0e8ff;
    /* 渐变色 */
    --gradient-primary: linear-gradient(135deg, #00f0ff 0%, #0080ff 50%, #7000ff 100%);
    --gradient-glow: linear-gradient(180deg, rgba(0,240,255,0.15) 0%, transparent 100%);
    --gradient-alert: linear-gradient(90deg, #ff0044, #ff8800);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.6;
  }
  /* 科技网格背景 */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0; pointer-events: none;
  }
  /* 科技光束粒子效果 */
  body::after {
    content: ''; position: fixed; inset: 0;
    background: 
      radial-gradient(2px 100px at 20% 50%, rgba(0,240,255,0.15), transparent),
      radial-gradient(2px 150px at 40% 30%, rgba(0,128,255,0.12), transparent),
      radial-gradient(1px 80px at 60% 70%, rgba(0,240,255,0.1), transparent),
      radial-gradient(2px 120px at 80% 40%, rgba(112,0,255,0.1), transparent),
      radial-gradient(1px 200px at 10% 80%, rgba(0,255,136,0.08), transparent),
      radial-gradient(2px 100px at 90% 20%, rgba(0,240,255,0.12), transparent);
    z-index: 9999; pointer-events: none;
    animation: light-beams 12s ease-in-out infinite;
  }
  @keyframes light-beams {
    0%, 100% { 
      opacity: 0.6;
      transform: scale(1) rotate(0deg);
    }
    25% { 
      opacity: 0.8;
      transform: scale(1.05) rotate(0.5deg);
    }
    50% { 
      opacity: 1;
      transform: scale(1.1) rotate(0deg);
    }
    75% { 
      opacity: 0.8;
      transform: scale(1.05) rotate(-0.5deg);
    }
  }

  .wrapper {
    position: relative; z-index: 1; height: 100vh;
    display: grid; grid-template-rows: auto 1fr;
    padding: 10px 14px 8px; gap: 0;
    overflow-x: hidden;
  }

  /* ===== 顶部标题 - 科技风格 ===== */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px;
    position: relative;
  }
  .header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
    height: 1px; background: var(--gradient-primary);
    opacity: 0.5;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    width: 42px; height: 42px;
    background: rgba(0,240,255,0.03);
    border: 1px solid var(--neon);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; 
    box-shadow: 0 0 15px rgba(0,240,255,0.3), inset 0 0 10px rgba(0,240,255,0.1);
    flex-shrink: 0;
    position: relative;
    animation: border-pulse 2s ease-in-out infinite;
    overflow: visible;
  }
  .logo-badge::before {
    content: '★';
    color: var(--neon);
    text-shadow: 
      0 0 10px var(--neon),
      0 0 20px var(--neon),
      0 0 30px rgba(0,240,255,0.8),
      0 0 40px rgba(0,240,255,0.6);
    animation: star-twinkle 1.5s ease-in-out infinite;
  }
  @keyframes star-twinkle {
    0%, 100% { 
      opacity: 1; 
      transform: scale(1);
      text-shadow: 
        0 0 10px var(--neon),
        0 0 20px var(--neon),
        0 0 30px rgba(0,240,255,0.8),
        0 0 40px rgba(0,240,255,0.6);
    }
    50% { 
      opacity: 0.7; 
      transform: scale(1.1);
      text-shadow: 
        0 0 20px var(--neon),
        0 0 40px var(--neon),
        0 0 60px rgba(0,240,255,1),
        0 0 80px rgba(0,240,255,0.8);
    }
  }
  @keyframes border-pulse { 0%,100%{border-color:rgba(0,240,255,0.5)}50%{border-color:rgba(0,240,255,1)} }
  .title-block h1 { 
    font-size: 22px; font-weight: 600; 
    color: var(--text-bright);
    letter-spacing: 3px; line-height: 1.2; 
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0,240,255,0.5);
  }
  .title-block h1::before {
    content: '> ';
    color: var(--neon);
  }
  .blessing { text-align: center; flex: 1; padding: 0 16px; }
  .blessing-text { 
    font-size: 14px; color: var(--neon); 
    letter-spacing: 2px; 
    animation: text-flicker 4s ease-in-out infinite; 
    transition: opacity 0.3s;
    font-family: 'JetBrains Mono', monospace;
  }
  @keyframes text-flicker { 
    0%,100%{opacity:0.6;text-shadow:0 0 5px rgba(0,240,255,0.3)} 
    50%{opacity:1;text-shadow:0 0 15px rgba(0,240,255,0.8)} 
  }
  .header-right { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .live-dot { width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 10px var(--green);animation:blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

  /* ===== 主体三栏 ===== */
  .main {
    display: grid;
    grid-template-columns: 320px 1fr 280px;
    gap: 8px; min-height: 0;
  }

  /* ===== 卡片 - 科技面板 ===== */
  .card {
    background: var(--card); 
    border: 1px solid var(--border);
    border-radius: 4px; padding: 12px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 8px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(0,240,255,0.05);
    transition: all 0.3s ease;
  }
  .card::before {
    content: ''; position: absolute; top:0;left:0;right:0; height:1px;
    background: var(--gradient-primary);
    opacity: 0.6;
  }
  .card::after {
    content: ''; position: absolute; top: 6px; right: 6px;
    width: 6px; height: 6px;
    border-top: 1px solid var(--neon);
    border-right: 1px solid var(--neon);
  }
  .card:hover {
    border-color: rgba(0,240,255,0.35);
    box-shadow: 0 0 30px rgba(0,240,255,0.08), inset 0 1px 0 rgba(0,240,255,0.08);
  }
  .card-title {
    font-size: 12px; font-weight: 600; letter-spacing: 2px; color: var(--neon);
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid rgba(0,240,255,0.1);
    padding-bottom: 8px;
    margin-bottom: 4px;
  }
  .card-title::before { 
    content: '//';
    color: var(--neon2);
    font-weight: 400;
  }
  /* 科技角落装饰 */
  .corner-deco { position:absolute;width:8px;height:8px; }
  .corner-deco.tl{top:0;left:0;border-top:1px solid var(--neon);border-left:1px solid var(--neon);}
  .corner-deco.tr{top:0;right:0;border-top:1px solid var(--neon);border-right:1px solid var(--neon);}
  .corner-deco.bl{bottom:0;left:0;border-bottom:1px solid var(--neon);border-left:1px solid var(--neon);}
  .corner-deco.br{bottom:0;right:0;border-bottom:1px solid var(--neon);border-right:1px solid var(--neon);}

  /* ===== 左栏 ===== */
  .left-panel { display:flex; flex-direction:column; gap:8px; min-height:0; overflow:hidden; }

  /* 倒计时（紧凑） */
  .countdown-card { flex-shrink:0; }
  .countdown-main { display:flex; justify-content:center; align-items:baseline; gap:4px; margin:2px 0; }
  .cd-unit { display:flex; align-items:baseline; gap:4px; }
  .cd-num { 
    font-size:48px;font-weight:700;
    color: var(--neon);
    text-shadow: 0 0 20px rgba(0,240,255,0.8), 0 0 40px rgba(0,240,255,0.4);
    line-height:1;
    animation:num-pulse 2s ease-in-out infinite;
    font-variant-numeric:tabular-nums;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -2px;
  }
  .cd-num.warning { 
    color: var(--yellow);
    text-shadow: 0 0 20px rgba(255,238,0,0.8), 0 0 40px rgba(255,238,0,0.4);
  }
  .cd-num.urgent { 
    color: var(--red);
    text-shadow: 0 0 20px rgba(255,0,68,0.8), 0 0 40px rgba(255,0,68,0.4);
    animation:num-urgent .5s ease-in-out infinite; 
  }
  @keyframes num-pulse { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.02);opacity:0.9} }
  @keyframes num-urgent { 0%,100%{transform:scale(1)}50%{transform:scale(1.05)} }
  .cd-label { font-size:12px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-family:'JetBrains Mono',monospace; }
  .cd-sep { font-size:28px;color:var(--neon);opacity:.5;animation:sep-blink 1s steps(1) infinite;font-family:'JetBrains Mono',monospace; }
  @keyframes sep-blink { 0%,100%{opacity:.5}50%{opacity:0.1} }
  .exam-date-line { text-align:center;font-size:12px;color:var(--text-dim);letter-spacing:1px;font-family:'JetBrains Mono',monospace; }

  /* 整体进度（横向紧凑布局） */
  .progress-overview { flex-shrink:0; min-height:200px; height:200px; overflow:hidden; }
  .progress-row {
    display: flex; align-items: stretch; gap: 16px;
  }
  .ring-wrap { position:relative;width:100px;height:100px;flex-shrink:0;align-self:center; }
  .ring-wrap svg { transform:rotate(-90deg);width:100%;height:100%; }
  .ring-bg { fill:none;stroke:rgba(0,240,255,.08);stroke-width:6; }
  .ring-bar { fill:none;stroke:url(#progressGrad);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 6px rgba(0,240,255,0.5)); }
  .ring-text { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center; }
  .ring-num { 
    font-size:30px;font-weight:700;
    color: var(--neon);
    text-shadow: 0 0 15px rgba(0,240,255,0.8);
    line-height:1;
    font-family: 'JetBrains Mono', monospace;
  }
  .ring-sub { font-size:11px;color:var(--text-dim); letter-spacing: 2px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .stats-col { flex:1; display:flex; flex-direction:column; gap:5px; justify-content:center; }
  .stat-item { 
    display:flex;align-items:center;justify-content:space-between;
    padding:5px 10px;
    background:rgba(0,240,255,0.02);
    border:1px solid rgba(0,240,255,0.06);
    border-radius:3px; 
    transition: all 0.2s ease;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-item:hover {
    background:rgba(0,240,255,0.04);
    border-color: rgba(0,240,255,0.1);
    box-shadow: 0 0 10px rgba(0,240,255,0.08);
  }
  .stat-num { font-size:17px;font-weight:700;line-height:1;font-family:'JetBrains Mono',monospace; }
  .stat-num.green{
    color: var(--green);
    text-shadow: 0 0 10px rgba(0,255,136,0.6);
  } 
  .stat-num.yellow{
    color: var(--neon);
    text-shadow: 0 0 10px rgba(0,240,255,0.6);
  } 
  .stat-num.gray{color:var(--text-dim)}
  .stat-label { font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase; }
  .mini-bar-row { display:flex;flex-direction:column;gap:6px; }
  .mini-progress-bar { height:4px;background:rgba(0,240,255,.08);border-radius:0;overflow:hidden; }
  .mini-progress-fill { 
    height:100%;border-radius:0;
    background: var(--neon);
    box-shadow: 0 0 8px rgba(0,240,255,0.6);
    transition:width 1.5s cubic-bezier(.4,0,.2,1); 
    position: relative;
  }
  .mini-progress-fill::after {
    content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8));
    animation: data-flow 2s linear infinite;
  }
  @keyframes data-flow {
    0% { transform: translateX(-20px); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(20px); opacity: 0; }
  }
  .mini-bar-label { font-size:11px;color:var(--text-dim);letter-spacing:1px;font-family:'JetBrains Mono',monospace; }

  /* 章节进度（展开填满） */
  .chapter-card { flex:1;min-height:100px;overflow:hidden;display:flex;flex-direction:column; }
  .chapter-bars { display:flex;flex-direction:column;gap:4px;overflow:hidden;flex:1;min-height:0;padding-top:6px; }
  .chapter-bar-item { display:flex;align-items:center;gap:6px;font-size:11px;min-height:20px;width:100%;box-sizing:border-box; }
  .chapter-bar-label { color:rgba(255,255,255,.55);width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;font-size:11px; }
  .chapter-bar-track { flex:1;min-width:0;height:10px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden; }
  .chapter-bar-fill { height:100%;border-radius:3px;transition:width 1.5s ease;opacity:0.5;filter:brightness(1.4); }
  .chapter-bar-pct { font-size:10px;color:rgba(0,245,255,.6);width:28px;text-align:right;flex-shrink:0; }

  /* ===== 中间栏 ===== */
  .center-panel { display:flex;flex-direction:column;gap:8px;min-height:0; }
  .timeline-card { flex:1;min-height:0;overflow:hidden; }
  .timeline-scroll { overflow-y:auto;height:calc(100% - 28px);padding-right:2px;scrollbar-width:thin;scrollbar-color:rgba(0,240,255,.2) transparent; }
  .timeline-scroll::-webkit-scrollbar{width:3px}
  .timeline-scroll::-webkit-scrollbar-thumb{background:rgba(0,240,255,.2);border-radius:0}

  /* 课次条目 - 科技风格 */
  .lesson-item {
    border-bottom:1px solid rgba(0,240,255,.05);
    position:relative; transition:all .15s;
  }
  .lesson-header {
    display:flex;align-items:center;gap:8px;padding:8px 6px;
    cursor:pointer;transition:all .15s;
    border-left: 2px solid transparent;
  }
  .lesson-header:hover{background:rgba(0,240,255,.04)}
  .lesson-item.expanded .lesson-header{background:rgba(0,240,255,.06);}
  .lesson-item.current-lesson .lesson-header{background:rgba(0,240,255,.08);border-left:2px solid var(--neon);}
  .lesson-item.linked-target .lesson-header{background:rgba(0,240,255,.12);border-left:2px solid var(--neon);box-shadow:inset 0 0 0 1px rgba(0,240,255,.18),0 0 18px rgba(0,240,255,.12);}
  .lesson-dot { width:10px;height:10px;border-radius:0;flex-shrink:0;box-shadow:0 0 8px currentColor;margin-top:1px; }

  .lesson-dot.done{background:var(--green);color:var(--green);transform:rotate(45deg);}
  .lesson-dot.studied{background:var(--neon);color:var(--neon)}
  .lesson-dot.review{background:var(--yellow);color:var(--yellow);box-shadow:0 0 8px var(--yellow);}
  .lesson-dot.partial{background:var(--yellow);color:var(--yellow);box-shadow:0 0 8px var(--yellow);}
  .lesson-dot.todo{background:transparent;border:1px solid var(--text-dim);box-shadow:none}
  .lesson-dot.current{background:var(--neon);color:var(--neon);animation:dot-pulse 1s ease-in-out infinite}
  @keyframes dot-pulse{0%,100%{box-shadow:0 0 5px var(--neon)}50%{box-shadow:0 0 15px var(--neon),0 0 25px rgba(0,240,255,0.5)}}
  .lesson-info{flex:1;min-width:0;}
  .lesson-num{font-size:12px;color:var(--text-dim);letter-spacing:1px;margin-bottom:3px;font-family:'JetBrains Mono',monospace;}
  .lesson-num::before{content:'#';color:var(--neon2);}
  .lesson-title{font-size:15px;font-weight:500;color:rgba(224,232,255,.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;text-shadow:0 0 8px rgba(224,232,255,.06);}
  .lesson-item.done-lesson .lesson-title{color:var(--green);opacity:0.8;}
  .lesson-item.todo-lesson .lesson-title{color:rgba(224,232,255,.72)}
  .lesson-item.current-lesson .lesson-title{color:var(--neon);text-shadow:0 0 10px rgba(0,240,255,0.5);}
  .lesson-date{font-size:12px;color:var(--text-dim);margin-top:3px;font-family:'JetBrains Mono',monospace;}
  .lesson-badge{font-size:11px;padding:3px 8px;border-radius:2px;flex-shrink:0;font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
  .badge-done{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
  .badge-partial{background:rgba(0,240,255,.1);color:var(--neon);border:1px solid rgba(0,240,255,.3)}
  .badge-review{background:rgba(255,238,0,.08);color:var(--yellow);border:1px solid rgba(255,238,0,.3)}
  .badge-current{background:rgba(0,240,255,.15);color:var(--neon);border:1px solid var(--neon);animation:badge-glow 1.5s ease-in-out infinite}
  .badge-todo{background:transparent;color:var(--text-dim);border:1px solid rgba(90,96,112,.3)}
  @keyframes badge-glow{0%,100%{box-shadow:0 0 5px rgba(0,240,255,.3)}50%{box-shadow:0 0 15px rgba(0,240,255,.6)}}
  .expand-arrow{font-size:14px;color:var(--neon);opacity:0.5;flex-shrink:0;transition:all .2s;}
  .lesson-item.expanded .expand-arrow{transform:rotate(90deg);opacity:1;}

  /* 展开的知识点列表 */
  .lesson-items-panel {
    display:none;
    padding:4px 4px 6px 28px;
    flex-direction:column; gap:3px;
    background:rgba(0,0,0,.45);
    border-radius:0 0 6px 6px;
  }
  .lesson-item.expanded .lesson-items-panel{display:flex;}
  .kp-item {
    display:flex;align-items:center;gap:8px;
    padding:6px 8px;border-radius:4px;cursor:pointer;
    font-size:13px;transition:background .15s;
    border:1px solid transparent;
    user-select:none;
  }
  .kp-item:hover{background:rgba(0,240,255,.05);border-color:rgba(0,240,255,.1);}
  .kp-item.linked-kp-target{background:rgba(0,240,255,.08);border-color:rgba(0,240,255,.22);box-shadow:0 0 12px rgba(0,240,255,.10);}
  .kp-dot { width:8px;height:8px;border-radius:0;flex-shrink:0;border:1px solid; transition:all .2s; }

  .kp-dot.done{background:var(--green);border-color:var(--green);box-shadow:0 0 5px var(--green);transform:rotate(45deg);}
  .kp-dot.studied{background:var(--neon);border-color:var(--neon);box-shadow:0 0 5px var(--neon);}
  .kp-dot.review{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 5px var(--yellow);}
  .kp-dot.partial{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 5px var(--yellow);}
  .kp-dot.todo{background:transparent;border-color:var(--text-dim);}
  .kp-text{flex:1;min-width:0;line-height:1.5;color:rgba(224,232,255,.82);text-shadow:0 0 6px rgba(224,232,255,.04);}
  .kp-text.done{color:var(--green);opacity:0.88;}
  .kp-text.studied{color:var(--neon);text-shadow:0 0 8px rgba(0,240,255,.12)}
  .kp-text.review{color:var(--yellow);text-shadow:0 0 8px rgba(255,238,0,.10)}
  .kp-text.partial{color:var(--yellow);text-shadow:0 0 8px rgba(255,238,0,.10)}

// ========== 状态管理 ==========
// 从 localStorage 加载，或用默认值
let rawData = loadProgress();

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // 合并：以保存的 status 为准，其他字段用默认值
      // 同时兼容旧数据：将 partial 迁移为 review
      return rawDataDefault.map(def => {
        const s = parsed.find(p => p.id === def.id);
        if (s) {
          const migratedStatus = s.status.map(st => st === 'partial' ? 'review' : st);
          return { ...def, status: migratedStatus };
        }
        return { ...def };
      });
    }
  } catch(e) {}
  // 默认数据也做迁移（rawDataDefault 里有 partial 的）
  return rawDataDefault.map(d => ({ ...d, status: d.status.map(st => st === 'partial' ? 'review' : st) }));
}

function saveProgress() {
  const toSave = rawData.map(d => ({ id: d.id, status: [...d.status] }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  hasUnsaved = false;
  document.getElementById('save-status').textContent = '已保存 ' + new Date().toLocaleTimeString('zh-CN', {hour12:false});
  showToast('✅ 进度已保存到本地');
}

function exportData() {
  // 导出当前进度的 JSON，可用于手动更新 Excel
  const exportObj = rawData.map(d => ({
    id: d.id,
    date: d.date,
    title: d.title,
    chapter: d.chapter,
    items: d.items.map((item, i) => ({ name: item, status: d.status[i] })),
    lessonStatus: getLessonStatus(d)
  }));
  const json = JSON.stringify(exportObj, null, 2);
  const blob = new Blob(['\uFEFF' + json], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '软考进度_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 数据已导出为 JSON 文件');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ========== 工具函数 ==========
function getLessonStatus(lesson) {
  const s = lesson.status;
  if (s.every(x => x === 'done')) return 'done';
  if (s.every(x => x === 'todo')) return 'todo';
  // 若有 review/partial 则显示 review
  if (s.some(x => x === 'review' || x === 'partial')) return 'review';
  // 否则（混合了 done/studied/todo）显示 studied
  return 'studied';
}

function getCurrentLesson() {
  for (let i = 0; i < rawData.length; i++) {
    const ls = getLessonStatus(rawData[i]);
    if (ls === 'todo' || ls === 'partial') return rawData[i];
  }
  return rawData[rawData.length - 1];
}

function cycleStatus(s) {
  // todo → done → studied → review → todo
  if (s === 'todo') return 'done';
  if (s === 'done') return 'studied';
  if (s === 'studied') return 'review';
  return 'todo';
}

const statusLabel = { done: '已完成', studied: '待练习', review: '待复习', partial: '待复习', todo: '待学习' };
const chapterColors = {
  '导学':'#00f0ff','计算机基础':'#0080ff','操作系统':'#7000ff',
  '程序语言':'#00ff88','数据结构':'#00a0ff','网络与安全':'#ff0044',
  '软件工程':'#4080ff','数据库':'#8040ff','软件测试':'#00c0c0',
  '自动化测试':'#0080ff','架构测试':'#4080ff','冲刺':'#ff0044'
};

// ========== 统计 ==========
function calcStats() {
  let total=0, done=0, studied=0, review=0, todo=0;
  rawData.forEach(l => {
    l.status.forEach(s => {
      total++;
      if(s==='done') done++;
      else if(s==='studied') studied++;
      else if(s==='review'||s==='partial') review++;
      else todo++;
    });
  });
  const pct = Math.round((done + studied + review) / total * 100);
  return { total, done, studied, review, todo, pct };
}

function calcChapterStats() {
  const map = {};
  rawData.forEach(l => {
    if(!map[l.chapter]) map[l.chapter]={ total:0, done:0 };
    l.status.forEach(s => {
      map[l.chapter].total++;
      if(s==='done'||s==='studied'||s==='review'||s==='partial') map[l.chapter].done++;
    });
  });
  return map;
}

// ========== 渲染 ==========
function renderStats() {
  const st = calcStats();
  document.getElementById('overall-pct').textContent = st.pct + '%';
  document.getElementById('stat-done').textContent = st.done;
  document.getElementById('stat-studied').textContent = st.studied;
  document.getElementById('stat-partial').textContent = st.review;
  document.getElementById('stat-todo').textContent = st.todo;
  document.getElementById('stat-total').textContent = st.total;
  document.getElementById('stat-lessons').textContent = rawData.length;
  setTimeout(() => {
    const offset = 264 * (1 - st.pct / 100);
    document.getElementById('big-circle').style.strokeDashoffset = offset;
    document.getElementById('mini-bar').style.width = st.pct + '%';
  }, 100);
}

function renderChapterBars() {
  const container = document.getElementById('chapter-bars');
  container.innerHTML = '';
  const chapterMap = calcChapterStats();
  Object.entries(chapterMap).forEach(([name, data]) => {
    const p = Math.round(data.done / data.total * 100);
    const color = chapterColors[name] || '#00f0ff';
    const div = document.createElement('div');
    div.className = 'chapter-bar-item';
    div.innerHTML = `
      <div class="chapter-bar-label" title="${name}">${name}</div>
      <div class="chapter-bar-track">
        <div class="chapter-bar-fill" style="width:0%;background:${color};box-shadow:0 0 4px ${color}" data-target="${p}"></div>
      </div>
      <div class="chapter-bar-pct">${p}%</div>
    `;
    container.appendChild(div);
  });
  setTimeout(() => {
    container.querySelectorAll('.chapter-bar-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  }, 200);
}

function renderTimeline() {
  const container = document.getElementById('timeline-list');
  container.innerHTML = '';
  const currentLesson = getCurrentLesson();
  rawData.forEach(lesson => {
    const ls = getLessonStatus(lesson);
    const isCurrent = lesson.id === currentLesson.id;
    const dotClass = isCurrent ? 'current' : ls === 'done' ? 'done' : ls === 'studied' ? 'studied' : ls === 'review' ? 'review' : 'todo';
    const badgeClass = isCurrent ? 'badge-current' : ls === 'done' ? 'badge-done' : ls === 'studied' ? 'badge-partial' : ls === 'review' ? 'badge-review' : 'badge-todo';
    const badgeText = isCurrent ? '当前' : ls === 'done' ? '已完成' : ls === 'studied' ? '待练习' : ls === 'review' ? '待复习' : '待学习';
    const lessonClass = isCurrent ? 'current-lesson' : ls === 'done' ? 'done-lesson' : 'todo-lesson';


    const item = document.createElement('div');
    item.className = `lesson-item ${lessonClass}`;
    item.dataset.id = lesson.id;

    // 知识点 HTML - 使用下拉选择框
    const kpHTML = lesson.items.map((kp, i) => {
      const s = lesson.status[i];
      return `
        <div class="kp-item" data-lid="${lesson.id}" data-idx="${i}">
          <div class="kp-dot ${s}"></div>
          <span class="kp-text ${s}">${kp}</span>
          <select class="kp-badge ${s}" data-lid="${lesson.id}" data-idx="${i}">
            <option value="todo" ${s==='todo'?'selected':''}>待学习</option>
            <option value="done" ${s==='done'?'selected':''}>已完成</option>
            <option value="studied" ${s==='studied'?'selected':''}>待练习</option>
            <option value="review" ${(s==='review'||s==='partial')?'selected':''}>待复习</option>
          </select>
        </div>
      `;
    }).join('');

    item.innerHTML = `
      <div class="lesson-header">
        <div class="lesson-dot ${dotClass}"></div>
        <div class="lesson-info">
          <div class="lesson-num">第 ${String(lesson.id).padStart(2,'0')} 课</div>
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-date">${lesson.date} · ${lesson.chapter}</div>
        </div>
        <div class="lesson-badge ${badgeClass}">${badgeText}</div>
        <div class="expand-arrow">▶</div>
      </div>
      <div class="lesson-items-panel">
        ${kpHTML}
      </div>
    `;

    container.appendChild(item);

    // 点击展开/收起
    item.querySelector('.lesson-header').addEventListener('click', () => {
      item.classList.toggle('expanded');
    });

    // 默认展开当前课
    if (isCurrent) {
      item.classList.add('expanded');
      setTimeout(() => item.scrollIntoView({ behavior:'smooth', block:'center' }), 500);
    }
  });

  // 知识点状态切换 - 使用下拉框 change 事件
  container.addEventListener('change', (e) => {
    if (!e.target.classList.contains('kp-badge')) return;
    e.stopPropagation();
    const select = e.target;
    const kpItem = select.closest('.kp-item');
    const lid = parseInt(select.dataset.lid);
    const idx = parseInt(select.dataset.idx);
    const lesson = rawData.find(l => l.id === lid);
    if (!lesson) return;
    const oldStatus = lesson.status[idx];
    const newStatus = select.value;
    if (newStatus === oldStatus) return;
    lesson.status[idx] = newStatus;

    // 更新点和文字
    kpItem.querySelector('.kp-dot').className = `kp-dot ${newStatus}`;
    kpItem.querySelector('.kp-text').className = `kp-text ${newStatus}`;
    select.className = `kp-badge ${newStatus}`;

    // 更新父级 lesson-item 外观
    const lessonItem = kpItem.closest('.lesson-item');
    updateLessonItemAppearance(lessonItem, lesson);

    // 更新统计
    renderStats();
    renderChapterBars();
    renderNextPlan();
    renderDangerList();

    // 标记未保存
    hasUnsaved = true;
    document.getElementById('save-status').textContent = '有未保存的更改';

    showToast(`已将「${lesson.items[idx].substring(0,10)}...」标记为 ${statusLabel[newStatus]}`);
  });
}

function updateLessonItemAppearance(itemEl, lesson) {
  const ls = getLessonStatus(lesson);
  const currentLesson = getCurrentLesson();
  const isCurrent = lesson.id === currentLesson.id;
  const dotClass = isCurrent ? 'current' : ls === 'done' ? 'done' : ls === 'studied' ? 'studied' : ls === 'review' ? 'review' : 'todo';
  const badgeClass = isCurrent ? 'badge-current' : ls === 'done' ? 'badge-done' : ls === 'studied' ? 'badge-partial' : ls === 'review' ? 'badge-review' : 'badge-todo';
  const badgeText = isCurrent ? '当前' : ls === 'done' ? '已完成' : ls === 'studied' ? '待练习' : ls === 'review' ? '待复习' : '待学习';
  const lessonClass = isCurrent ? 'current-lesson' : ls === 'done' ? 'done-lesson' : 'todo-lesson';

  itemEl.className = `lesson-item ${lessonClass}` + (itemEl.classList.contains('expanded') ? ' expanded' : '');
  itemEl.querySelector('.lesson-dot').className = `lesson-dot ${dotClass}`;
  itemEl.querySelector('.lesson-badge').className = `lesson-badge ${badgeClass}`;
  itemEl.querySelector('.lesson-badge').textContent = badgeText;

  const titleEl = itemEl.querySelector('.lesson-title');
  titleEl.style.color = '';
}

function jumpToLesson(lessonId, kpIndex = null) {
  const timelineItem = document.querySelector(`.lesson-item[data-id="${lessonId}"]`);
  if (!timelineItem) return;

  document.querySelectorAll('.lesson-item.linked-target').forEach(el => el.classList.remove('linked-target'));
  document.querySelectorAll('.kp-item.linked-kp-target').forEach(el => el.classList.remove('linked-kp-target'));

  timelineItem.classList.add('expanded');
  timelineItem.classList.add('linked-target');
  timelineItem.scrollIntoView({ behavior:'smooth', block:'center' });

  setTimeout(() => {
    timelineItem.classList.remove('linked-target');
  }, 1800);

  if (kpIndex === null) return;

  setTimeout(() => {
    const kpItem = timelineItem.querySelector(`.kp-item[data-idx="${kpIndex}"]`);
    if (!kpItem) return;
    kpItem.classList.add('linked-kp-target');
    kpItem.scrollIntoView({ behavior:'smooth', block:'nearest' });
    setTimeout(() => kpItem.classList.remove('linked-kp-target'), 1800);
  }, 260);
}

function renderNextPlan() {

  const lesson = getCurrentLesson();
  document.getElementById('next-num').textContent = `第 ${String(lesson.id).padStart(2,'0')} 课（原计划：${lesson.date}）`;
  document.getElementById('next-title').textContent = lesson.title;
  document.getElementById('next-date').textContent = '';
  const container = document.getElementById('next-content-list');
  container.innerHTML = '';
  lesson.items.forEach((item, i) => {
    const s = lesson.status[i];
    const div = document.createElement('div');
    div.className = 'next-content-item jumpable';
    div.dataset.lessonId = lesson.id;
    div.dataset.idx = i;
    const prefix = s === 'done' ? '✓ ' : s === 'studied' ? '◈ ' : (s === 'review' || s === 'partial') ? '⚠ ' : '';
    div.textContent = prefix + item;
    if(s === 'done') div.style.color = '#00ff88';
    if(s === 'studied') div.style.color = '#00f0ff';
    if(s === 'review' || s === 'partial') div.style.color = '#ffee00';
    container.appendChild(div);
  });

  container.onclick = (e) => {
    const item = e.target.closest('.next-content-item.jumpable');
    if (!item) return;
    jumpToLesson(Number(item.dataset.lessonId), Number(item.dataset.idx));
  };
}

function renderDangerList() {
  const dangers = [];
  rawData.forEach(lesson => {
    lesson.items.forEach((item, i) => {
      if(lesson.status[i] === 'review' || lesson.status[i] === 'partial') dangers.push({ lessonId: lesson.id, lesson:`第${lesson.id}课`, item, idx: i });
    });
  });
  const container = document.getElementById('danger-list');
  container.innerHTML = '';
  dangers.forEach(d => {
    const div = document.createElement('div');
    div.className = 'danger-item jumpable';
    div.dataset.lessonId = d.lessonId;
    div.dataset.idx = d.idx;
    div.innerHTML = `<span class="danger-icon">⚠</span><span><b style="color:rgba(255,238,0,.7);font-size:9px;">${d.lesson}</b> ${d.item}</span>`;
    container.appendChild(div);
  });
  if(dangers.length === 0) {
    const ok = document.createElement('div');
    ok.className = 'danger-item';
    ok.style.borderColor = 'rgba(0,255,136,.2)';
    ok.style.background = 'rgba(0,255,136,.04)';
    ok.innerHTML = `<span style="color:rgba(0,255,136,.6);font-size:9px;">🎉 暂无待复习知识点，继续加油！</span>`;
    container.appendChild(ok);
  }

  container.onclick = (e) => {
    const item = e.target.closest('.danger-item.jumpable');
    if (!item) return;
    jumpToLesson(Number(item.dataset.lessonId), Number(item.dataset.idx));
  };
}

function updateClock() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const time = now.toLocaleTimeString('zh-CN',{hour12:false});
  document.getElementById('live-clock').textContent = `${y}-${m}-${d} ${time}`;
}

function updateCountdown() {
  const diff = EXAM_DATE - new Date();
  if(diff <= 0) { ['cd-days','cd-hours','cd-mins'].forEach(id=>document.getElementById(id).textContent='00'); return; }
  const days = Math.floor(diff/86400000);
  const hours = Math.floor((diff%86400000)/3600000);
  const mins = Math.floor((diff%3600000)/60000);
  const dEl=document.getElementById('cd-days'), hEl=document.getElementById('cd-hours'), mEl=document.getElementById('cd-mins');
  dEl.textContent=String(days).padStart(2,'0');
  hEl.textContent=String(hours).padStart(2,'0');
  mEl.textContent=String(mins).padStart(2,'0');
  const cls = days<=7?'cd-num urgent':days<=30?'cd-num warning':'cd-num';
  [dEl,hEl,mEl].forEach(el=>el.className=cls);
}

function rotateBlessings() {
  blessingIdx=(blessingIdx+1)%blessings.length;

    pulse.className='particle pulse';
    pulse.style.left=Math.random()*100+'%';
    pulse.style.top=Math.random()*100+'%';
    pulse.style.animationDuration=(2+Math.random()*3)+'s';
    pulse.style.animationDelay=(Math.random()*3)+'s';
    c.appendChild(pulse);
  }
}

// ========== 键盘快捷键 ==========
document.addEventListener('keydown', (e) => {
  if((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveProgress(); }
});

// ========== 启动 ==========
window.addEventListener('load', () => {
  updateClock();
  updateCountdown();
  renderStats();
  renderChapterBars();
  renderTimeline();
  renderNextPlan();
  renderDangerList();
  rotateBlessings();
  createParticles();
  setInterval(updateClock, 1000);
  setInterval(updateCountdown, 1000);
  setInterval(rotateBlessings, 5000);
  // 提示已加载的状态
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved) {
    document.getElementById('save-status').textContent = '已从本地恢复进度';
  }
});
</script>
</body>
</html>
